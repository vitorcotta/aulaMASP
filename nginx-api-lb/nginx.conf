worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream api_backend {
        # Round-robin simples entre 3 APIs, sem healthcheck explícito
        server api1:5000;
        server api2:5000;
        server api3:5000;
        #server api1:5000 max_fails=2 fail_timeout=10s;
        #server api2:5000 max_fails=2 fail_timeout=10s;
        #server api3:5000 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_read_timeout 5s;
            proxy_connect_timeout 2s;

            # Habilita CORS para permitir chamada do site em outra porta
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        }
    }
}


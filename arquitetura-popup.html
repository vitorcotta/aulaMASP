<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Arquitetura (com pop-up de imagens)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top, #0f172a 0, #020617 45%, #000 100%); color:#e5e7eb; min-height:100vh; }
      .page { width:min(100%, 980px); margin:0 auto; padding:1rem; }
      .card { background:rgba(15,23,42,0.95); border:1px solid rgba(148,163,184,0.4); border-radius:1rem; padding:1rem 1.2rem; }
      h1 { margin:0; font-size:1.6rem; }
      .nav { margin:0.7rem 0 1rem; display:flex; flex-wrap:wrap; gap:0.35rem; }
      .nav a { text-decoration:none; color:#e5e7eb; border:1px solid rgba(148,163,184,0.45); border-radius:999px; background:rgba(2,6,23,0.4); padding:0.3rem 0.75rem; }
      .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:0.6rem; margin-top:0.6rem; }
      .box { background:rgba(31,41,55,0.75); border:1px solid rgba(100,116,139,0.45); border-radius:0.65rem; padding:0.65rem; }
      .box h2 { margin:0 0 0.4rem; font-size:1rem; }
      .thumbs { display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); gap:0.4rem; }
      .thumbs button { border:1px solid rgba(148,163,184,0.35); background:#0d1729; border-radius:0.4rem; color:#fff; padding:0.45rem; text-align:left; cursor:pointer; }
      .thumbs button:hover { border-color:#60a5fa; }
      .legend { color:#9ca3af; font-size:0.88rem; margin-top:0.3rem; }
      .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; padding:1rem; z-index:40; }
      .modal { background:#0b1220; border:1px solid #334155; border-radius:0.65rem; max-width:95vw; max-height:95vh; width:min(980px,100%); overflow:auto; padding:0.5rem; }
      .modal img { max-width:100%; max-height:80vh; display:block; margin:auto; }
      .close { display:block; margin-top:0.5rem; background:#181b2b; color:#e5e7eb; border:1px solid #475569; border-radius:0.45rem; padding:0.35rem 0.6rem; text-align:center; width:fit-content; margin-left:auto; }
    </style>
  </head>
  <body>
    <div class="page card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:0.5rem; flex-wrap:wrap;">
        <div>
          <div class="pill" style="display:inline-flex; align-items:center; gap:0.35rem; background:rgba(30,41,59,0.7); border:1px solid rgba(148,163,184,0.35); padding:0.2rem 0.65rem; border-radius:999px; font-size:0.8rem; margin-bottom:0.35rem;"><span style="width:8px;height:8px;border-radius:999px;background:#22c55e;display:inline-block;"></span> Pop-up de imagens</div>
          <h1>Arquitetura + Imagens de configuração/log</h1>
          <p class="legend">Aqui você pode clicar em um item para abrir a imagem em pop-up.</p>
        </div>
        <!-- <nav class="nav">
          <a href="/arquitetura.html">Arquitetura</a>
          <a href="/tudo.html">Topologia</a>
          <a href="/arquitetura-popup.html">Popup</a>
        </nav> -->
      </div>

      <div class="grid">
        <div class="box">
          <h2>Arquivos de configuração</h2>
          <div class="thumbs" id="arquivo-list"></div>
          <p class="legend">Local: <code>img/</code> (conf files)</p>
        </div>
        <div class="box">
          <h2>Logs (capturas)</h2>
          <div class="thumbs" id="logs-list"></div>
          <p class="legend">Local: <code>img/</code> (logs)</p>
        </div>
      </div>
    </div>

    <div id="modal" class="modal-bg" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <div style="display:flex; justify-content:flex-end;"><button class="close" id="close">Fechar</button></div>
        <img id="modal-img" src="" alt="Visualização" />
      </div>
    </div>

    <script>
      const arquivo = [
        'img/nginx.conf.api.png',
        'img/nginx.conf.site.png'
      ];
      const logs = [
        'img/log api1.png',
        'img/log api2.png',
        'img/log api3.png',
        'img/log nginx api.png',
        'img/log nginx sites.png',
        'img/log site1.png',
        'img/log site2.png',
        'img/log site 3.png',
        'img/docker compose ps.png'
      ];

      function labelFromPath(path){
        return path.split('/').pop();
      }

      function createButtons(list, containerId){
        const c = document.getElementById(containerId);
        list.forEach((p)=>{
          const b = document.createElement('button');
          b.type='button';
          b.textContent = labelFromPath(p);
          b.onclick = ()=>openModal(p);
          c.appendChild(b);
        });
      }

      const modal = document.getElementById('modal');
      const modalImg = document.getElementById('modal-img');
      const closeBtn = document.getElementById('close');

      function openModal(src){
        modalImg.src = src;
        modal.style.display = 'flex';
      }
      function closeModal(){
        modal.style.display = 'none';
        modalImg.src = '';
      }
      closeBtn.onclick = closeModal;
      modal.addEventListener('click', (e)=>{ if(e.target===modal) closeModal(); });
      document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeModal(); });

      createButtons(arquivo, 'arquivo-list');
      createButtons(logs, 'logs-list');
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Site MASP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: #e5e7eb;
      }
      .card {
        background: rgba(15, 23, 42, 0.9);
        border-radius: 1rem;
        padding: 2rem 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.75);
        max-width: 420px;
        width: 100%;
        text-align: center;
        border: 1px solid rgba(148, 163, 184, 0.4);
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        font-size: 0.9rem;
        color: #9ca3af;
        margin-bottom: 1.5rem;
      }
      .status-box {
        padding: 1rem 1.25rem;
        border-radius: 0.75rem;
        background: rgba(15, 118, 110, 0.12);
        border: 1px solid rgba(45, 212, 191, 0.3);
        margin-bottom: 1.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.95rem;
      }
      button {
        background: #22c55e;
        color: #022c22;
        border: none;
        border-radius: 999px;
        padding: 0.7rem 1.6rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, background 0.15s ease-out;
        box-shadow: 0 10px 25px -10px rgba(34, 197, 94, 0.5);
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 35px -16px rgba(34, 197, 94, 0.75);
        background: #16a34a;
      }
      button:active {
        transform: translateY(0);
        box-shadow: 0 10px 25px -10px rgba(34, 197, 94, 0.5);
      }
      .small {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: #6b7280;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.2rem 0.8rem;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.16);
        border: 1px solid rgba(59, 130, 246, 0.6);
        font-size: 0.75rem;
        margin-bottom: 1rem;
        color: #bfdbfe;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.35);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="pill">
        <span class="dot"></span>
        <span>LAB MASP</span>
      </div>
      <h1>Processo de Negócio</h1>
      <p class="subtitle">
        executar processo.
      </p>

      <div class="status-box" id="status">
        Clique em "Executar" para iniciar o cenário.
      </div>

      <button id="btn">
        <span>Executar</span>
      </button>
      <button id="btn-image" style="margin-top:0.75rem; background:#3b82f6; color:#fff; border:none; border-radius:0.6rem; padding:0.55rem 1rem; cursor:pointer;">Abrir imagem de debug</button>
    </main>

    <div id="imgModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000;">
      <div style="background:#111827; border:1px solid #334155; border-radius:0.7rem; padding:0.7rem; max-width:90vw; width:min(680px,90vw);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
          <div style="color:#e2e8f0; font-weight:600;">Imagem de debug</div>
          <button id="closeImg" style="border:none; background:#ef4444; color:#fff; border-radius:0.45rem; padding:0.25rem 0.45rem; cursor:pointer;">Fechar</button>
        </div>
        <img src="HwJ9GR.png" alt="Debug" style="width:100%; max-height:70vh; object-fit:contain; border-radius:0.4rem; border:1px solid #334155;" />
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      const btnImage = document.getElementById('btn-image');
      const modal = document.getElementById('imgModal');
      const closeImg = document.getElementById('closeImg');
      btnImage.addEventListener('click', ()=>{ modal.style.display='flex'; });
      closeImg.addEventListener('click', ()=>{ modal.style.display='none'; });
      modal.addEventListener('click', e=>{ if(e.target===modal){ modal.style.display='none'; }});
    </script>
  </body>
</html>

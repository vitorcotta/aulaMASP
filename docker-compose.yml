version: "3.9"

services:
  nginx_sites:
    image: nginx:stable-alpine
    container_name: nginx_sites
    ports:
      - "8080:80"
    volumes:
      - ./nginx-sites-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - site1
      - site2
      - site3

  site1:
    build: ./site
    container_name: site1

  site2:
    build: ./site
    container_name: site2

  site3:
    build: ./site
    container_name: site3

  nginx_api:
    image: nginx:stable-alpine
    container_name: nginx_api
    ports:
      - "8081:80"
    volumes:
      - ./nginx-api-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
      - api3

  api1:
    build: ./api
    container_name: api1
    environment:
      - API_NAME=api1
      - API_BEHAVIOR=ok

  api2:
    build: ./api
    container_name: api2
    environment:
      - API_NAME=api2
      - API_BEHAVIOR=ok

  api3:
    build: ./api
    container_name: api3
    environment:
      - API_NAME=api3
      - API_BEHAVIOR=broken

networks:
  default:
    name: masp_lab
